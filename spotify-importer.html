<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spotify Importer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #ccc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #111;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 32px;
    }

    h1 {
      font-size: 18px;
      font-weight: normal;
      color: #f0f0f0;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 12px;
      color: #444;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #eee;
      font-family: inherit;
      font-size: 13px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #1db954; }

    .file-drop {
      border: 1px dashed #2a2a2a;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: #444;
      cursor: pointer;
      margin-bottom: 16px;
      transition: border-color 0.2s, color 0.2s;
    }

    .file-drop:hover, .file-drop.over { border-color: #1db954; color: #1db954; }
    .file-drop.loaded { border-color: #555; color: #aaa; }

    input[type="file"] { display: none; }

    button {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #ccc;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 8px;
    }

    button:hover { background: #1a1a1a; border-color: #444; color: #fff; }

    button.primary {
      border-color: #1db954;
      color: #1db954;
    }

    button.primary:hover { background: rgba(29,185,84,0.08); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .log {
      margin-top: 20px;
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 14px;
      font-size: 11px;
      line-height: 1.8;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }

    .log.visible { display: block; }

    .log .ok   { color: #1db954; }
    .log .skip { color: #666; }
    .log .err  { color: #e05252; }
    .log .info { color: #888; }

    .progress {
      margin-top: 14px;
      font-size: 12px;
      color: #555;
      display: none;
    }

    .progress.visible { display: block; }

    .bar-wrap {
      height: 3px;
      background: #1e1e1e;
      border-radius: 2px;
      margin-top: 8px;
    }

    .bar {
      height: 100%;
      background: #1db954;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }

    .section { margin-bottom: 20px; }

    .hint {
      font-size: 11px;
      color: #333;
      margin-top: -10px;
      margin-bottom: 16px;
    }

    a { color: #1db954; }
  </style>
</head>
<body>
<div class="card">
  <h1>Spotify Importer</h1>
  <p class="subtitle">TXT → Spotify playlist · Artist - Title format</p>

  <!-- Step 1: Client ID -->
  <div class="section" id="step-auth">
    <label>Spotify Client ID</label>
    <input type="text" id="client-id" placeholder="your_client_id_here" />
    <p class="hint">
      <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com/dashboard</a>
      → Create app → Redirect URI: <code style="color:#555">current page URL</code>
    </p>
    <button class="primary" id="btn-auth">Connect Spotify</button>
  </div>

  <!-- Step 2: Import -->
  <div class="section" id="step-import" style="display:none">
    <label>Playlist name</label>
    <input type="text" id="playlist-name" placeholder="My Yandex Playlist" />

    <label>TXT file</label>
    <div class="file-drop" id="drop-zone">
      Drop file here or click to choose
      <input type="file" id="file-input" accept=".txt" />
    </div>

    <button class="primary" id="btn-start" disabled>Start Import</button>
    <button id="btn-logout">Disconnect</button>
  </div>

  <div class="progress" id="progress">
    <span id="progress-text">0 / 0</span>
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
  const SCOPES = 'playlist-modify-public playlist-modify-private';

  /** @type {string|null} */
  let accessToken = null;
  /** @type {string[]} */
  let tracks = [];

  // ─── PKCE helpers ────────────────────────────────────────────────────────────

  const randomBytes = (n) => crypto.getRandomValues(new Uint8Array(n));

  const base64url = (buf) =>
    btoa(String.fromCharCode(...buf)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

  const sha256 = async (str) => {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return new Uint8Array(buf);
  };

  const generatePKCE = async () => {
    const verifier = base64url(randomBytes(32));
    const challenge = base64url(await sha256(verifier));
    return { verifier, challenge };
  };

  // ─── Auth ─────────────────────────────────────────────────────────────────────

  document.getElementById('btn-auth').addEventListener('click', async () => {
    const clientId = document.getElementById('client-id').value.trim();
    if (!clientId) return alert('Enter Client ID');

    const { verifier, challenge } = await generatePKCE();
    sessionStorage.setItem('pkce_verifier', verifier);
    sessionStorage.setItem('spotify_client_id', clientId);

    const params = new URLSearchParams({
      client_id: clientId,
      response_type: 'code',
      redirect_uri: location.href.split('?')[0],
      scope: SCOPES,
      code_challenge_method: 'S256',
      code_challenge: challenge,
    });

    location.href = `https://accounts.spotify.com/authorize?${params}`;
  });

  const exchangeCode = async (code) => {
    const clientId = sessionStorage.getItem('spotify_client_id');
    const verifier = sessionStorage.getItem('pkce_verifier');

    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code,
        redirect_uri: location.href.split('?')[0],
        client_id: clientId,
        code_verifier: verifier,
      }),
    });

    const data = await res.json();
    if (data.access_token) {
      accessToken = data.access_token;
      sessionStorage.setItem('spotify_token', accessToken);
      history.replaceState({}, '', location.pathname);
    }
  };

  const initAuth = async () => {
    const params = new URLSearchParams(location.search);
    const code = params.get('code');

    if (code) {
      await exchangeCode(code);
    } else {
      accessToken = sessionStorage.getItem('spotify_token');
    }

    if (accessToken) {
      document.getElementById('step-auth').style.display = 'none';
      document.getElementById('step-import').style.display = 'block';
    }
  };

  document.getElementById('btn-logout').addEventListener('click', () => {
    sessionStorage.clear();
    location.reload();
  });

  // ─── File drop ────────────────────────────────────────────────────────────────

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('over');
    handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  /** @param {File} file */
  const handleFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      tracks = e.target.result
        .split('\n')
        .map((l) => l.trim())
        .filter(Boolean);

      dropZone.textContent = `${file.name} · ${tracks.length} tracks`;
      dropZone.classList.add('loaded');
      document.getElementById('btn-start').disabled = false;
    };
    reader.readAsText(file, 'utf-8');
  };

  // ─── Spotify API ─────────────────────────────────────────────────────────────

  /** @param {string} endpoint @param {RequestInit} opts */
  const spotifyFetch = (endpoint, opts = {}) =>
    fetch(`https://api.spotify.com/v1${endpoint}`, {
      ...opts,
      headers: {
        Authorization: `Bearer ${accessToken}`,
        'Content-Type': 'application/json',
        ...(opts.headers ?? {}),
      },
    }).then((r) => r.json());

  const getMe = () => spotifyFetch('/me');

  /** @param {string} userId @param {string} name */
  const createPlaylist = async (userId, name) => {
    const res = await spotifyFetch(`/users/${userId}/playlists`, {
      method: 'POST',
      body: JSON.stringify({ name, public: false, description: 'Imported from Yandex Music' }),
    });
    if (!res.id) throw new Error(`Failed to create playlist: ${JSON.stringify(res)}`);
    return res;
  };

  /** @param {string} query @returns {Promise<string|null>} Spotify URI */
  const searchTrack = async (query) => {
    const data = await spotifyFetch(`/search?q=${encodeURIComponent(query)}&type=track&limit=1`);
    return data.tracks?.items?.[0]?.uri ?? null;
  };

  /** @param {string} playlistId @param {string[]} uris */
  const addTracks = (playlistId, uris) =>
    spotifyFetch(`/playlists/${playlistId}/tracks`, {
      method: 'POST',
      body: JSON.stringify({ uris }),
    });

  // ─── Import flow ─────────────────────────────────────────────────────────────

  const log = document.getElementById('log');
  const progress = document.getElementById('progress');
  const progressText = document.getElementById('progress-text');
  const bar = document.getElementById('bar');

  /** @param {string} msg @param {'ok'|'skip'|'err'|'info'} type */
  const logLine = (msg, type = 'info') => {
    const line = document.createElement('div');
    line.className = type;
    line.textContent = msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  };

  const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

  document.getElementById('btn-start').addEventListener('click', async () => {
    const playlistName = document.getElementById('playlist-name').value.trim() || 'Imported Playlist';
    if (!tracks.length) return;

    document.getElementById('btn-start').disabled = true;
    log.innerHTML = '';
    log.classList.add('visible');
    progress.classList.add('visible');

    logLine(`Starting import of ${tracks.length} tracks...`);

    const me = await getMe();
    if (!me.id) {
      logLine(`Auth error — disconnect and reconnect. Details: ${JSON.stringify(me)}`, 'err');
      document.getElementById('btn-start').disabled = false;
      return;
    }

    logLine(`Logged in as ${me.display_name} (${me.id})`);

    let playlist;
    try {
      playlist = await createPlaylist(me.id, playlistName);
    } catch (e) {
      logLine(e.message, 'err');
      document.getElementById('btn-start').disabled = false;
      return;
    }

    logLine(`Playlist created: ${playlist.name} · id: ${playlist.id}`);

    /** @type {string[]} */
    const uris = [];
    let found = 0;
    let notFound = 0;

    for (let i = 0; i < tracks.length; i++) {
      const query = tracks[i];
      progressText.textContent = `${i + 1} / ${tracks.length}`;
      bar.style.width = `${((i + 1) / tracks.length) * 100}%`;

      const uri = await searchTrack(query);
      if (uri) {
        uris.push(uri);
        found++;
        logLine(`✓ ${query}`, 'ok');
      } else {
        notFound++;
        logLine(`✗ ${query}`, 'skip');
      }

      // Batch add every 100 tracks (Spotify limit)
      if (uris.length === 100) {
        await addTracks(playlist.id, [...uris]);
        uris.length = 0;
      }

      // Rate limit safety
      await sleep(150);
    }

    if (uris.length) await addTracks(playlist.id, uris);

    logLine(`Done. Found: ${found}, not found: ${notFound}`, 'info');
    logLine(`→ open.spotify.com/playlist/${playlist.id}`, 'ok');
    document.getElementById('btn-start').disabled = false;
  });

  // ─── Init ─────────────────────────────────────────────────────────────────────

  initAuth();
</script>
</body>
</html>
